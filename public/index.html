<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/logo_s.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#1e293b" />
  <meta name="description" content="RealEstate CRM - Lead & Booking Management" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  
  <!-- Preload fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <title>RealEstate CRM</title>

  <style>
    /* Critical CSS — prevent FOUC */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0f172a; color: #e2e8f0; }
    #root { min-height: 100vh; }
    
    /* Initial loader */
    .app-initial-loader {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #0f172a;
    }
    .app-initial-loader .spinner {
      width: 48px; height: 48px; border: 4px solid #1e293b;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this application.</noscript>
  <div id="root">
    <div class="app-initial-loader">
      <div class="spinner"></div>
    </div>
  </div>
</body>
</html>
